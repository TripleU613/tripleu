name = "tripleu-scraper-cron"
main = "scraper-cron.js"
compatibility_date = "2024-01-01"
account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

# Node.js compatibility for Puppeteer
compatibility_flags = [ "nodejs_compat" ]

# Cron triggers - Run every 5 hours
[triggers]
crons = ["0 */5 * * *"]

# Browser Rendering binding for Puppeteer support
[browser]
binding = "BROWSER"

# KV namespace binding (same as API worker)
[[kv_namespaces]]
binding = "API_CACHE"
id = "YOUR_KV_NAMESPACE_ID"
