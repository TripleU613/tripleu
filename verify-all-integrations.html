<!DOCTYPE html>
<html>
<head>
    <title>Verify All Integrations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #111;
            color: #ddd;
            max-width: 1200px;
            margin: 0 auto;
        }
        .integration {
            margin: 30px 0;
            padding: 20px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #1a1a1a;
        }
        .success { border-color: #4caf50; }
        .error { border-color: #f44336; }
        .warning { border-color: #ff9800; }
        h2 { color: #4a9eff; margin-top: 0; }
        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        .status-success { background: #4caf50; color: white; }
        .status-error { background: #f44336; color: white; }
        .status-loading { background: #ff9800; color: white; }
        pre {
            background: #222;
            padding: 10px;
            overflow: auto;
            border-radius: 5px;
            font-size: 12px;
            max-height: 300px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <h1>Integration Status Dashboard</h1>

    <div class="grid">
        <!-- Forum Integration -->
        <div class="integration" id="forum-integration">
            <h2><i class="fas fa-comments"></i> Forum Integration <span class="status status-loading">Testing...</span></h2>
            <div id="forum-content">Loading...</div>
        </div>

        <!-- GitHub Integration -->
        <div class="integration" id="github-integration">
            <h2><i class="fab fa-github"></i> GitHub Integration <span class="status status-loading">Testing...</span></h2>
            <div id="github-content">Loading...</div>
        </div>
    </div>

    <!-- Token Safety Check -->
    <div class="integration" id="token-safety">
        <h2><i class="fas fa-shield-alt"></i> GitHub Token Safety <span class="status status-loading">Checking...</span></h2>
        <div id="safety-content">Loading...</div>
    </div>

    <!-- Live Preview -->
    <div class="integration">
        <h2><i class="fas fa-eye"></i> Live Preview</h2>
        <p>How it looks on your website:</p>
        <iframe src="index.html#latest-post" style="width: 100%; height: 600px; border: 1px solid #333; border-radius: 5px;"></iframe>
    </div>

    <script>
        // Forum Integration Test
        async function testForumIntegration() {
            const container = document.getElementById('forum-integration');
            const content = document.getElementById('forum-content');
            const status = container.querySelector('.status');

            try {
                const apiKey = '***REDACTED***';
                const forumUrl = 'https://forums.jtechforums.org';
                const username = 'TripleU';

                const proxy = 'https://api.allorigins.win/get?url=';
                const apiUrl = `${forumUrl}/user_actions.json?username=${username}&filter=5&api_key=${apiKey}`;

                const response = await fetch(proxy + encodeURIComponent(apiUrl));
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents);

                if (data.user_actions && data.user_actions.length > 0) {
                    const latest = data.user_actions[0];

                    container.className = 'integration success';
                    status.className = 'status status-success';
                    status.textContent = 'Connected';

                    content.innerHTML = `
                        <p><strong>✅ Forum API Working</strong></p>
                        <p><strong>Latest Post:</strong> ${latest.title}</p>
                        <p><strong>Created:</strong> ${new Date(latest.created_at).toLocaleString()}</p>
                        <p><strong>Likes:</strong> ${latest.likes_received || 0}</p>
                        <p><strong>URL:</strong> <a href="${forumUrl}/t/${latest.slug}/${latest.topic_id}" target="_blank" style="color: #4a9eff;">View Post</a></p>
                        <details>
                            <summary>Raw Data</summary>
                            <pre>${JSON.stringify(latest, null, 2)}</pre>
                        </details>
                    `;
                } else {
                    throw new Error('No forum posts found');
                }
            } catch (error) {
                container.className = 'integration error';
                status.className = 'status status-error';
                status.textContent = 'Error';
                content.innerHTML = `<p>❌ Error: ${error.message}</p>`;
            }
        }

        // GitHub Integration Test
        async function testGitHubIntegration() {
            const container = document.getElementById('github-integration');
            const content = document.getElementById('github-content');
            const status = container.querySelector('.status');

            try {
                const token = '***REDACTED***';
                const username = 'TripleU613';

                const response = await fetch(`https://api.github.com/users/${username}/events/public`, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                const events = await response.json();

                if (events && events.length > 0) {
                    const latest = events[0];

                    container.className = 'integration success';
                    status.className = 'status status-success';
                    status.textContent = 'Connected';

                    let description = latest.type.replace('Event', '');
                    if (latest.type === 'PushEvent') {
                        const commits = latest.payload.commits || [];
                        description = `Pushed ${commits.length} commit(s)`;
                        if (commits[0]) {
                            description += `: "${commits[0].message}"`;
                        }
                    }

                    content.innerHTML = `
                        <p><strong>✅ GitHub API Working</strong></p>
                        <p><strong>Latest Activity:</strong> ${description}</p>
                        <p><strong>Repository:</strong> ${latest.repo.name}</p>
                        <p><strong>Time:</strong> ${new Date(latest.created_at).toLocaleString()}</p>
                        <p><strong>URL:</strong> <a href="https://github.com/${latest.repo.name}" target="_blank" style="color: #4a9eff;">View Repo</a></p>
                        <details>
                            <summary>Raw Data</summary>
                            <pre>${JSON.stringify(latest, null, 2)}</pre>
                        </details>
                    `;
                } else {
                    throw new Error('No GitHub events found');
                }
            } catch (error) {
                container.className = 'integration error';
                status.className = 'status status-error';
                status.textContent = 'Error';
                content.innerHTML = `<p>❌ Error: ${error.message}</p>`;
            }
        }

        // Token Safety Test
        async function testTokenSafety() {
            const container = document.getElementById('token-safety');
            const content = document.getElementById('safety-content');
            const status = container.querySelector('.status');

            try {
                const token = '***REDACTED***';

                // Try a write operation (should fail)
                const writeResponse = await fetch('https://api.github.com/user/repos', {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: 'test-should-fail',
                        private: false
                    })
                });

                if (writeResponse.status === 403 || writeResponse.status === 401 || writeResponse.status === 404) {
                    container.className = 'integration success';
                    status.className = 'status status-success';
                    status.textContent = 'Secure';

                    content.innerHTML = `
                        <p><strong>✅ Token is READ-ONLY</strong></p>
                        <ul>
                            <li>✅ Cannot create repositories (Status: ${writeResponse.status})</li>
                            <li>✅ Cannot modify user data</li>
                            <li>✅ Can only read public information</li>
                            <li>✅ Safe to use in client-side code</li>
                        </ul>
                        <p style="color: #4caf50; font-weight: bold;">This token is safe for public use!</p>
                    `;
                } else {
                    throw new Error(`Token has write permissions! Status: ${writeResponse.status}`);
                }
            } catch (error) {
                if (error.message.includes('write permissions')) {
                    container.className = 'integration error';
                    status.className = 'status status-error';
                    status.textContent = 'Unsafe';
                    content.innerHTML = `<p>⚠️ Warning: ${error.message}</p>`;
                } else {
                    container.className = 'integration success';
                    status.className = 'status status-success';
                    status.textContent = 'Secure';
                    content.innerHTML = `<p>✅ Token appears to be read-only (network error on write attempt is expected)</p>`;
                }
            }
        }

        // Run all tests
        testForumIntegration();
        testGitHubIntegration();
        testTokenSafety();
    </script>
</body>
</html>
