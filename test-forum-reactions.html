<!DOCTYPE html>
<html>
<head>
    <title>Test Forum Reactions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #111;
            color: #ddd;
        }
        .test {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #333;
            border-radius: 5px;
            background: #1a1a1a;
        }
        pre {
            background: #222;
            padding: 10px;
            overflow: auto;
            border-radius: 3px;
            font-size: 12px;
        }
        h2 { color: #4a9eff; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <h1>Testing Forum Reactions & Likes</h1>
    <div id="results"></div>

    <script>
        const apiKey = '***REDACTED***';
        const forumUrl = 'https://forums.jtechforums.org';
        const username = 'TripleU';
        const resultsDiv = document.getElementById('results');

        async function testDetailedPost() {
            const tests = [
                {
                    name: 'User Actions with Details',
                    url: `${forumUrl}/user_actions.json?username=${username}&filter=5&api_key=${apiKey}`
                },
                {
                    name: 'Latest Posts',
                    url: `${forumUrl}/posts.json?api_key=${apiKey}`
                },
                {
                    name: 'User Summary',
                    url: `${forumUrl}/u/${username}/summary.json`
                },
                {
                    name: 'Search with Details',
                    url: `${forumUrl}/search.json?q=@${username}%20order:latest&include_blurbs=true`
                }
            ];

            for (const test of tests) {
                const testDiv = document.createElement('div');
                testDiv.className = 'test';

                try {
                    console.log(`Testing: ${test.name}`);

                    // Try with AllOrigins GET (wrapped)
                    const proxy = 'https://api.allorigins.win/get?url=';
                    const response = await fetch(proxy + encodeURIComponent(test.url));

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const wrapper = await response.json();
                    if (wrapper.status?.http_code !== 200) {
                        throw new Error(`Wrapped response: ${wrapper.status.http_code}`);
                    }

                    const data = JSON.parse(wrapper.contents);

                    // Look for posts/actions and extract reaction data
                    let reactions = [];
                    let postData = null;

                    if (data.user_actions?.length > 0) {
                        postData = data.user_actions[0];
                    } else if (data.posts?.length > 0) {
                        // Find TripleU's posts
                        const userPosts = data.posts.filter(p =>
                            p.username?.toLowerCase() === username.toLowerCase()
                        );
                        if (userPosts.length > 0) {
                            postData = userPosts[0];
                        }
                    } else if (data.topic_list?.topics?.length > 0) {
                        postData = data.topic_list.topics[0];
                    }

                    if (postData) {
                        // Extract all reaction-related fields
                        const reactionFields = {
                            likes: postData.likes || postData.like_count || 0,
                            likes_received: postData.likes_received || 0,
                            reactions: postData.reactions || [],
                            reaction_users_count: postData.reaction_users_count || 0,
                            replies: postData.reply_count || postData.posts_count || 0,
                            views: postData.views || 0,
                            reads: postData.reads || 0,
                            readers_count: postData.readers_count || 0
                        };

                        testDiv.innerHTML = `
                            <h2 class="success">✅ ${test.name}</h2>
                            <p><strong>Post:</strong> ${postData.title || postData.topic_title || 'N/A'}</p>
                            <p><strong>Reactions Data:</strong></p>
                            <ul>
                                <li>Likes: ${reactionFields.likes}</li>
                                <li>Likes Received: ${reactionFields.likes_received}</li>
                                <li>Replies: ${reactionFields.replies}</li>
                                <li>Views: ${reactionFields.views}</li>
                                <li>Reaction Count: ${reactionFields.reaction_users_count}</li>
                            </ul>
                            <details>
                                <summary>View Full Response</summary>
                                <pre>${JSON.stringify(postData, null, 2)}</pre>
                            </details>
                        `;
                    } else {
                        testDiv.innerHTML = `
                            <h2 class="success">✅ ${test.name}</h2>
                            <p>Response received but no posts found for ${username}</p>
                            <details>
                                <summary>View Response Structure</summary>
                                <pre>${JSON.stringify(Object.keys(data), null, 2)}</pre>
                            </details>
                        `;
                    }

                } catch (error) {
                    testDiv.innerHTML = `
                        <h2 class="error">❌ ${test.name}</h2>
                        <p>Error: ${error.message}</p>
                    `;
                }

                resultsDiv.appendChild(testDiv);
            }

            // Try to get a specific topic to see its reactions
            const specificTestDiv = document.createElement('div');
            specificTestDiv.className = 'test';

            try {
                // First get user's latest topic ID
                const proxy = 'https://api.allorigins.win/get?url=';
                const actionsUrl = `${forumUrl}/user_actions.json?username=${username}&filter=5&api_key=${apiKey}`;
                const actionsResponse = await fetch(proxy + encodeURIComponent(actionsUrl));
                const actionsWrapper = await actionsResponse.json();
                const actionsData = JSON.parse(actionsWrapper.contents);

                if (actionsData.user_actions?.length > 0) {
                    const topicId = actionsData.user_actions[0].topic_id;

                    // Now fetch the specific topic
                    const topicUrl = `${forumUrl}/t/${topicId}.json?api_key=${apiKey}`;
                    const topicResponse = await fetch(proxy + encodeURIComponent(topicUrl));
                    const topicWrapper = await topicResponse.json();
                    const topicData = JSON.parse(topicWrapper.contents);

                    // Find TripleU's posts in the topic
                    const userPosts = topicData.post_stream?.posts?.filter(p =>
                        p.username?.toLowerCase() === username.toLowerCase()
                    ) || [];

                    if (userPosts.length > 0) {
                        const post = userPosts[0];
                        specificTestDiv.innerHTML = `
                            <h2 class="success">✅ Specific Topic Details</h2>
                            <p><strong>Topic:</strong> ${topicData.title}</p>
                            <p><strong>Your Post #${post.post_number}:</strong></p>
                            <ul>
                                <li>Actions Summary: ${JSON.stringify(post.actions_summary || [])}</li>
                                <li>Reactions: ${JSON.stringify(post.reactions || [])}</li>
                                <li>Likes: ${post.like_count || 0}</li>
                                <li>Reads: ${post.reads || 0}</li>
                                <li>Score: ${post.score || 0}</li>
                            </ul>
                            <details>
                                <summary>View Full Post Data</summary>
                                <pre>${JSON.stringify(post, null, 2)}</pre>
                            </details>
                        `;
                    }
                }
            } catch (error) {
                specificTestDiv.innerHTML = `
                    <h2 class="error">❌ Specific Topic Test</h2>
                    <p>Error: ${error.message}</p>
                `;
            }

            resultsDiv.appendChild(specificTestDiv);
        }

        // Run tests
        testDetailedPost();
    </script>
</body>
</html>
