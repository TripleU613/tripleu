<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Restricted | TripleU</title>
    <meta name="description" content="Access restricted - You don't have permission to access this resource.">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Lock animation */
        .lock-container {
            position: relative;
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .lock-shackle {
            animation: shake 3s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            10% {
                transform: translateX(-2px);
            }
            20% {
                transform: translateX(2px);
            }
            30% {
                transform: translateX(-2px);
            }
            40% {
                transform: translateX(2px);
            }
            50% {
                transform: translateX(0);
            }
        }

        /* Scanning line effect */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 0, 0, 0.8) 45%,
                rgba(255, 0, 0, 1) 50%,
                rgba(255, 0, 0, 0.8) 55%,
                transparent 100%);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% {
                top: 0%;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                top: 100%;
                opacity: 0;
            }
        }

        /* Error code styling */
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff0000 0%, #ff4444 50%, #ff0000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2a2a2a;
        }

        /* Shield animation */
        .shield {
            animation: shield-pulse 2s ease-in-out infinite;
        }

        @keyframes shield-pulse {
            0%, 100% {
                opacity: 0.8;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }
    </style>
</head>
<body class="bg-black text-gray-100 min-h-screen flex items-center justify-center">
    <!-- Background gradient -->
    <div class="fixed inset-0 bg-gradient-to-br from-black via-red-900/5 to-black -z-10"></div>

    <!-- Scanning overlay -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="scan-line"></div>
    </div>

    <!-- Main content -->
    <div class="text-center px-4 relative">
        <!-- Lock icon with animation -->
        <div class="lock-container mb-8">
            <div class="relative">
                <svg class="w-32 h-32 mx-auto text-red-500 shield" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
        </div>

        <h1 class="error-code">403</h1>

        <h2 class="text-2xl sm:text-3xl font-bold mb-4 text-red-400">Access Restricted</h2>

        <div class="max-w-md mx-auto mb-8">
            <p class="text-gray-400 mb-4">
                <i class="fas fa-shield-halved mr-2 text-red-500"></i>
                This area is restricted. You don't have the necessary permissions to access this resource.
            </p>
            <div class="bg-gray-900/50 border border-red-900/30 rounded-lg p-4 text-sm text-gray-500">
                <p class="font-mono">ERROR_CODE: FORBIDDEN_ACCESS</p>
                <p class="font-mono">IP_LOGGED: TRUE</p>
                <p class="font-mono">ACCESS_LEVEL: INSUFFICIENT</p>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="inline-flex items-center px-6 py-3 bg-red-600 hover:bg-red-700 rounded-lg transition-all duration-300 hover:shadow-lg hover:shadow-red-600/20">
                <i class="fas fa-home mr-2"></i>
                Return Home
            </a>
            <button onclick="requestAccess()" class="inline-flex items-center px-6 py-3 bg-gray-800 hover:bg-gray-700 rounded-lg transition-all duration-300 border border-gray-700">
                <i class="fas fa-key mr-2"></i>
                Request Access
            </button>
        </div>

        <!-- Warning message -->
        <div class="mt-8 text-xs text-gray-600">
            <i class="fas fa-exclamation-triangle mr-1 text-yellow-500"></i>
            Unauthorized access attempts are logged and monitored
        </div>
    </div>

    <script>
        // Request access function
        function requestAccess() {
            alert('Access request submitted. Please contact the administrator for permissions.');
        }

        // Add some interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            // Add glitch effect on hover
            const errorCode = document.querySelector('.error-code');
            errorCode.addEventListener('mouseenter', function() {
                this.style.animation = 'glitch 0.3s';
                setTimeout(() => {
                    this.style.animation = '';
                }, 300);
            });
        });

        // Glitch animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes glitch {
                0%, 100% {
                    transform: translate(0);
                }
                20% {
                    transform: translate(-2px, 2px);
                }
                40% {
                    transform: translate(-2px, -2px);
                }
                60% {
                    transform: translate(2px, 2px);
                }
                80% {
                    transform: translate(2px, -2px);
                }
            }
        `;
        document.head.appendChild(style);
    </script>

</body>
</html>
