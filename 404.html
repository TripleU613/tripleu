<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | TripleU</title>
    <meta name="description" content="Page not found - The page you're looking for doesn't exist.">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Glitch effect for 404 text */
        .glitch {
            position: relative;
            color: #fff;
            font-size: 8rem;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                        -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                        0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 1s infinite;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            animation: glitch-1 0.5s infinite;
            color: #00ffff;
            z-index: -1;
        }

        .glitch::after {
            animation: glitch-2 0.5s infinite;
            color: #ff00ff;
            z-index: -2;
        }

        @keyframes glitch {
            0%, 100% {
                text-shadow: 0.05em 0 0 rgba(30, 90, 255, 0.75),
                            -0.05em -0.025em 0 rgba(0, 180, 255, 0.75),
                            0.025em 0.05em 0 rgba(0, 50, 200, 0.75);
            }
            15% {
                text-shadow: 0.05em 0 0 rgba(30, 90, 255, 0.75),
                            -0.05em -0.025em 0 rgba(0, 180, 255, 0.75),
                            0.025em 0.05em 0 rgba(0, 50, 200, 0.75);
            }
            16% {
                text-shadow: -0.05em -0.025em 0 rgba(30, 90, 255, 0.75),
                            0.025em 0.025em 0 rgba(0, 180, 255, 0.75),
                            -0.05em -0.05em 0 rgba(0, 50, 200, 0.75);
            }
            49% {
                text-shadow: -0.05em -0.025em 0 rgba(30, 90, 255, 0.75),
                            0.025em 0.025em 0 rgba(0, 180, 255, 0.75),
                            -0.05em -0.05em 0 rgba(0, 50, 200, 0.75);
            }
            50% {
                text-shadow: 0.025em 0.05em 0 rgba(30, 90, 255, 0.75),
                            0.025em 0 0 rgba(0, 180, 255, 0.75),
                            0 -0.05em 0 rgba(0, 50, 200, 0.75);
            }
            99% {
                text-shadow: 0.025em 0.05em 0 rgba(30, 90, 255, 0.75),
                            0.025em 0 0 rgba(0, 180, 255, 0.75),
                            0 -0.05em 0 rgba(0, 50, 200, 0.75);
            }
        }

        @keyframes glitch-1 {
            0%, 100% {
                clip: rect(132px, 9999px, 101px, 0);
                transform: skew(0.3deg);
            }
            5% {
                clip: rect(17px, 9999px, 94px, 0);
                transform: skew(0.8deg);
            }
            10% {
                clip: rect(40px, 9999px, 66px, 0);
                transform: skew(0.1deg);
            }
        }

        @keyframes glitch-2 {
            0%, 100% {
                clip: rect(79px, 9999px, 86px, 0);
                transform: skew(0.5deg);
            }
            5% {
                clip: rect(20px, 9999px, 30px, 0);
                transform: skew(0.8deg);
            }
            10% {
                clip: rect(25px, 9999px, 5px, 0);
                transform: skew(0.2deg);
            }
        }

        /* Floating particles */
        .particle {
            position: fixed;
            pointer-events: none;
            opacity: 0.3;
            background: radial-gradient(circle, rgba(30, 90, 255, 0.8) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2a2a2a;
        }
    </style>
</head>
<body class="bg-black text-gray-100 min-h-screen flex items-center justify-center">
    <!-- Background gradient -->
    <div class="fixed inset-0 bg-gradient-to-br from-black via-black to-blue-900/10 -z-10"></div>

    <!-- Floating particles -->
    <div id="particles"></div>

    <!-- Main content -->
    <div class="text-center px-4">
        <div class="mb-8">
            <h1 class="glitch" data-text="404">404</h1>
        </div>

        <h2 class="text-2xl sm:text-3xl font-bold mb-4 text-blue-400">Page Not Found</h2>

        <p class="text-gray-400 max-w-md mx-auto mb-8">
            Looks like you've ventured into the digital void. The page you're looking for doesn't exist or has been moved.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="inline-flex items-center px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">
                <i class="fas fa-home mr-2"></i>
                Go Home
            </a>
            <button onclick="history.back()" class="inline-flex items-center px-6 py-3 bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors">
                <i class="fas fa-arrow-left mr-2"></i>
                Go Back
            </button>
        </div>
    </div>

    <script>
        // Create floating particles
        const particleContainer = document.getElementById('particles');

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';

            const size = Math.random() * 4 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;

            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100}%`;

            const duration = Math.random() * 20 + 10;
            particle.style.animation = `float ${duration}s infinite ease-in-out`;

            particleContainer.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
        }

        // Create particles periodically
        setInterval(createParticle, 1000);

        // Initial particles
        for (let i = 0; i < 10; i++) {
            setTimeout(createParticle, i * 100);
        }

        // Float animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                0%, 100% {
                    transform: translateY(0) translateX(0);
                }
                25% {
                    transform: translateY(-20px) translateX(10px);
                }
                50% {
                    transform: translateY(10px) translateX(-10px);
                }
                75% {
                    transform: translateY(-10px) translateX(20px);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
